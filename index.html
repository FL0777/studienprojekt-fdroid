<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein F-Droid Repository</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 40px 20px; background: #f0f2f5; color: #1c1e21; }
        .card { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #606770; line-height: 1.4; }
        .qr-code { margin: 25px 0; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 10px; }
        code { background: #e4e6eb; padding: 8px 12px; border-radius: 6px; display: block; margin: 20px 0; font-family: monospace; font-size: 0.9em; word-break: break-all; }
        .footer { margin-top: 40px; font-size: 0.8em; color: #90949c; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📱 Studienprojekt Repo</h1>
        <p>Scanne diesen Code mit der F-Droid App, um das Repository hinzuzufügen:</p>
        
        <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://fl0777.github.io/fdroid-studienprojekt/repo" alt="QR Code für F-Droid Repo">
        
        <p>Oder kopiere die URL manuell:</p>
        <code>https://fl0777.github.io/fdroid-studienprojekt/repo</code>
    </div>
    <div class="footer">
        Erstellt mit ❤️ für F-Droid & GitHub Pages
    </div>
